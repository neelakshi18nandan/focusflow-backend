# MySQL Database
# TODO: Replace with your actual MySQL credentials
spring.datasource.url=jdbc:mysql://localhost:3306/focusflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=20250218
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# update = auto-creates/updates tables on startup (use 'validate' in production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8080

# CORS is configured in CorsConfig.java

# Logging
logging.level.com.focusflow=DEBUG
